name: AppImage

on:
  workflow_dispatch:
    inputs:
      upload_tag:
        description: "Optional release tag to upload (e.g. v0.1.5). Leave empty for artifact only."
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: write

env:
  APPIMAGE_EXTRACT_AND_RUN: 1
  SKIP_GLIBC_CHECK: 1

jobs:
  build-appimage:
    name: Build portable AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl ca-certificates file \
            build-essential pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev \
            libwayland-dev libssl-dev

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh

      - name: Verify glibc requirement
        run: |
          getconf GNU_LIBC_VERSION
          BIN=target/release/mameuix
          echo "Required GLIBC symbols (highest):"
          objdump -T "$BIN" | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -5

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mameuix-appimage-x86_64
          path: MAMEUIx-*.AppImage
          if-no-files-found: error

      - name: Upload to GitHub Release (release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" MAMEUIx-*.AppImage --clobber

      - name: Upload to GitHub Release (manual tag)
        if: github.event_name == 'workflow_dispatch' && inputs.upload_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.upload_tag }}" MAMEUIx-*.AppImage --clobber
